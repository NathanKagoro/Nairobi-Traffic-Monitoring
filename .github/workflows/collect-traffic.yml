name: Collect Traffic Data

on:
  schedule:
    # Run every 30 minutes
    - cron: '*/30 * * * *'
  
  # Allow manual trigger
  workflow_dispatch:

jobs:
  collect-traffic:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run traffic collection
        env:
          TOMTOM_API_KEY: ${{ secrets.TOMTOM_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python main.py collect
      
      - name: Log completion
        if: success()
        run: echo "Traffic collection completed successfully"
      
      - name: Handle failure
        if: failure()
        run: echo "Traffic collection failed - check logs for details"
